name: CI / Deploy

on:
  push:
    branches:
      - '**'

jobs:
  ci:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (with fix)
        run: npm run lint -- --fix

      - name: Format
        run: npx prettier --write .

      - name: Unit tests
        run: npm run test:unit -- --run